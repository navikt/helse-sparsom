apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: sparsom-api
  namespace: tbd
  labels:
    team: tbd
spec:
  image: {{image}}
  port: 8080
  liveness:
    path: isalive
    initialDelay: 1
  readiness:
    path: isready
    periodSeconds: 1
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 50m
      memory: 64Mi
  replicas:
    min: 2
    max: 4
  prometheus:
    enabled: true
    path: /metrics
  azure:
    application:
      enabled: true
      tenant: trygdeetaten.no
      claims:
        groups:
        - id: "9046ac9d-bb00-47dc-bcfb-e5221bf8d7f9" # tbd-dev
  accessPolicy:
    inbound:
      rules:
        - application: spanner
    outbound:
      rules:
        - application: logging
          namespace: nais-system
      external:
        - host: opensearch-tbd-sparsom-nav-dev.a.aivencloud.com
          ports:
            - port: 26482
  openSearch:
    access: read
    instance: sparsom
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
