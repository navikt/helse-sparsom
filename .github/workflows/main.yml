name: Bygg og deploy Sparsom

on:
  push:
    paths-ignore:
      - ".idea/**"
      - "README.md"
      - "LICENSE"
      - "CODEOWNERS"
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'
env:
  CONTAINER_REGISTRY: europe-north1-docker.pkg.dev
jobs:
  set_version:
    name: Set image name
    runs-on: ubuntu-latest
    steps:
      - name: create docker tag
        run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
    outputs:
      tag: ${{ env.TAG }}

  build:
    name: Build docker image
    runs-on: ubuntu-latest
    needs: set_version
    strategy:
      fail-fast: false
      matrix:
        app: [sparsom, api, opprydding]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21.x"
          cache: "gradle"
      - name: Test and build
        run: ./gradlew ${{ matrix.app }}:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build container image
        if: ${{ github.ref_name == 'main' }}
        uses: nais/docker-build-push@v0
        with:
          team: tbd
          tag: ${{ needs.set_version.outputs.tag }}
          image_suffix: ${{ matrix.app }}
          dockerfile: Dockerfile
          docker_context: ${{ matrix.app }}

  deployDev:
    name: Deploy to dev
    needs: [set_version, build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - image_suffix: sparsom
            resource: deploy/dev.yml
          - image_suffix: api
            resource: deploy/dev-api.yml
          - image_suffix: opprydding
            resource: deploy/dev-opprydding.yml
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: ${{ matrix.app.resource }}
          IMAGE: ${{ env.CONTAINER_REGISTRY }}/nais-management-233d/tbd/${{ github.event.repository.name }}-${{ matrix.app.image_suffix }}:${{ needs.set_version.outputs.tag }}

  deployProd:
    name: Deploy to prod
    needs: [set_version, build]
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - image_suffix: sparsom
            resource: deploy/prod.yml,deploy/hpa.yml
          - image_suffix: api
            resource: deploy/prod-api.yml
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: ${{ matrix.app.resource }}
          IMAGE: ${{ env.CONTAINER_REGISTRY }}/nais-management-233d/tbd/${{ github.event.repository.name }}-${{ matrix.app.image_suffix }}:${{ needs.set_version.outputs.tag }}
